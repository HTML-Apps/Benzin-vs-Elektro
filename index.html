<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCO Dashboard: Benzin vs. Elektro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #e1e4e8;
            --primary-color: #0056b3;
            --accent-benzin: #e74c3c;
            --accent-elektro: #2ecc71;
            --input-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --saving-bg: #eafaf1;
            --saving-text: #27ae60;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --primary-color: #4da3ff;
            --accent-benzin: #ff6b6b;
            --accent-elektro: #4cd137;
            --input-bg: #2a2a2a;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --saving-bg: #1b2e1f;
            --saving-text: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 20px auto; }
        .theme-toggle { background: var(--primary-color); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 1024px) { .dashboard { grid-template-columns: 1fr 1fr 1.2fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); }
        .card h2 { font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Ersparnis Badge */
        .saving-badge {
            background-color: var(--saving-bg);
            color: var(--saving-text);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--saving-text);
        }
        .saving-badge .amount { font-size: 1.8rem; font-weight: 800; display: block; }
        .saving-badge .label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-color); font-size: 1rem; }
        
        .results-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.95rem; }
        .results-table td { padding: 10px 5px; border-bottom: 1px solid var(--border-color); }
        .total-row { font-weight: bold; font-size: 1.1rem; }
        
        .chart-container { height: 280px; width: 100%; margin-top: 10px; }
        .reset-btn { width: 100%; background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>🚗 Kosten-Check 2026</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Dark/Light</button>
    </header>

    <div class="dashboard">
        <div class="card">
            <h2>⚙️ Fahrprofil & Energie</h2>
            <div class="input-group"><label>KM / Jahr gesamt</label><input type="number" id="km_gesamt" data-key="km_gesamt" oninput="calculate()"></div>
            <div class="input-group"><label>Davon Urlaub (KM)</label><input type="number" id="km_urlaub" data-key="km_urlaub" oninput="calculate()"></div>
            
            <p style="color:var(--accent-benzin); font-weight:bold; margin: 15px 0 5px 0;">⛽ Benzin SUV</p>
            <div class="input-group"><label>Verbrauch L/100km</label><input type="number" step="0.1" id="verbrauch_benzin" data-key="verbrauch_benzin" oninput="calculate()"></div>
            <div class="input-group"><label>Benzinpreis €/L</label><input type="number" step="0.01" id="preis_benzin" data-key="preis_benzin" oninput="calculate()"></div>

            <p style="color:var(--accent-elektro); font-weight:bold; margin: 15px 0 5px 0;">⚡ Elektro SUV</p>
            <div class="input-group"><label>Verbrauch kWh/100km</label><input type="number" step="0.1" id="verbrauch_strom" data-key="verbrauch_strom" oninput="calculate()"></div>
            <div class="input-group"><label>Strompreis Arbeit €/kWh</label><input type="number" step="0.001" id="preis_strom_arbeit" data-key="preis_strom_arbeit" oninput="calculate()"></div>
            <div class="input-group"><label>Strompreis Urlaub €/kWh</label><input type="number" step="0.01" id="preis_strom_urlaub" data-key="preis_strom_urlaub" oninput="calculate()"></div>
        </div>

        <div class="card">
            <h2>📅 Fixkosten & Service</h2>
            <p style="color:var(--accent-benzin); font-weight:bold; margin-bottom:5px;">⛽ Benzin SUV</p>
            <div class="input-group"><label>Steuer (€)</label><input type="number" id="steuer_benzin" data-key="steuer_benzin" oninput="calculate()"></div>
            <div class="input-group"><label>Versicherung VK (€)</label><input type="number" id="vers_benzin" data-key="vers_benzin" oninput="calculate()"></div>
            <div class="input-group"><label>Wartung (€)</label><input type="number" id="wartung_benzin" data-key="wartung_benzin" oninput="calculate()"></div>

            <p style="color:var(--accent-elektro); font-weight:bold; margin: 15px 0 5px 0;">⚡ Elektro SUV</p>
            <div class="input-group"><label>Versicherung VK (€)</label><input type="number" id="vers_elektro" data-key="vers_elektro" oninput="calculate()"></div>
            <div class="input-group"><label>Wartung (€)</label><input type="number" id="wartung_elektro" data-key="wartung_elektro" oninput="calculate()"></div>
            <div class="input-group"><label>THG-Quote Bonus (€)</label><input type="number" id="thg_praemie" data-key="thg_praemie" oninput="calculate()"></div>
            
            <button class="reset-btn" onclick="resetDefaults()">🔄 Reset auf Standard</button>
        </div>

        <div class="card">
            <div id="saving_container" class="saving-badge">
                <span class="label" id="saving_label">Deine jährliche Ersparnis</span>
                <span class="amount" id="saving_amount">0,00 €</span>
            </div>

            <table class="results-table">
                <tr class="total-row">
                    <td>Gesamt Benzin</td>
                    <td id="res_total_b" style="text-align:right; color:var(--accent-benzin)">0 €</td>
                </tr>
                <tr class="total-row">
                    <td>Gesamt Elektro</td>
                    <td id="res_total_e" style="text-align:right; color:var(--accent-elektro)">0 €</td>
                </tr>
            </table>

            <div class="chart-container">
                <canvas id="costChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const defaultValues = {
            km_gesamt: 12500, km_urlaub: 2000, verbrauch_benzin: 6.8, preis_benzin: 1.80,
            verbrauch_strom: 18.5, preis_strom_arbeit: 0.375, preis_strom_urlaub: 0.59,
            steuer_benzin: 140, vers_benzin: 650, wartung_benzin: 450,
            vers_elektro: 720, wartung_elektro: 250, thg_praemie: 80
        };

        let costChart = null;

        function toggleTheme() {
            const body = document.documentElement;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateChartTheme();
        }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            loadData();
            initChart();
            calculate();
        };

        function loadData() {
            document.querySelectorAll('input[data-key]').forEach(input => {
                const val = localStorage.getItem(input.dataset.key);
                input.value = val !== null ? val : defaultValues[input.dataset.key];
            });
        }

        function resetDefaults() {
            Object.keys(defaultValues).forEach(key => {
                document.getElementById(key).value = defaultValues[key];
                localStorage.setItem(key, defaultValues[key]);
            });
            calculate();
        }

        function calculate() {
            const getV = id => parseFloat(document.getElementById(id).value) || 0;
            
            // Sync LocalStorage
            document.querySelectorAll('input[data-key]').forEach(i => localStorage.setItem(i.dataset.key, i.value));

            const kmG = getV('km_gesamt'), kmU = getV('km_urlaub'), kmA = Math.max(0, kmG - kmU);

            // Benzin
            const eB = (kmG / 100) * getV('verbrauch_benzin') * getV('preis_benzin');
            const totalB = eB + getV('steuer_benzin') + getV('vers_benzin') + getV('wartung_benzin');

            // Elektro
            const eE = ((kmA / 100) * getV('verbrauch_strom') * getV('preis_strom_arbeit')) + ((kmU / 100) * getV('verbrauch_strom') * getV('preis_strom_urlaub'));
            const totalE = eE + getV('vers_elektro') + getV('wartung_elektro') - getV('thg_praemie');

            // UI Update
            document.getElementById('res_total_b').innerText = totalB.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
            document.getElementById('res_total_e').innerText = totalE.toLocaleString('de-DE', {style:'currency', currency:'EUR'});

            // Ersparnis Logic
            const diff = totalB - totalE;
            const sContainer = document.getElementById('saving_container');
            const sAmount = document.getElementById('saving_amount');
            const sLabel = document.getElementById('saving_label');

            sAmount.innerText = Math.abs(diff).toLocaleString('de-DE', {style:'currency', currency:'EUR'});
            if(diff >= 0) {
                sLabel.innerText = "Ersparnis mit Elektro pro Jahr";
                sContainer.style.backgroundColor = "var(--saving-bg)";
                sContainer.style.borderColor = "var(--saving-text)";
                sContainer.style.color = "var(--saving-text)";
            } else {
                sLabel.innerText = "Mehrkosten gegenüber Benzin";
                sContainer.style.backgroundColor = "rgba(231, 76, 60, 0.1)";
                sContainer.style.borderColor = "var(--accent-benzin)";
                sContainer.style.color = "var(--accent-benzin)";
            }

            updateChart([eB, getV('vers_benzin'), getV('wartung_benzin'), getV('steuer_benzin')], [eE, getV('vers_elektro'), getV('wartung_elektro'), -getV('thg_praemie')]);
        }

        function initChart() {
            costChart = new Chart(document.getElementById('costChart'), {
                type: 'bar',
                data: {
                    labels: ['Benzin', 'Elektro'],
                    datasets: [
                        { label: 'Energie', data: [0,0], backgroundColor: '#3498db' },
                        { label: 'Versicherung', data: [0,0], backgroundColor: '#9b59b6' },
                        { label: 'Wartung', data: [0,0], backgroundColor: '#f1c40f' },
                        { label: 'Steuer/THG', data: [0,0], backgroundColor: '#e67e22' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } },
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
            updateChartTheme();
        }

        function updateChart(dB, dE) {
            if(!costChart) return;
            costChart.data.datasets[0].data = [dB[0], dE[0]];
            costChart.data.datasets[1].data = [dB[1], dE[1]];
            costChart.data.datasets[2].data = [dB[2], dE[2]];
            costChart.data.datasets[3].data = [dB[3], dE[3]];
            costChart.update();
        }

        function updateChartTheme() {
            if(!costChart) return;
            const color = getComputedStyle(document.documentElement).getPropertyValue('--text-color');
            costChart.options.scales.x.ticks.color = color;
            costChart.options.scales.y.ticks.color = color;
            costChart.options.plugins.legend.labels.color = color;
            costChart.update();
        }
    </script>
</body>
</html>
